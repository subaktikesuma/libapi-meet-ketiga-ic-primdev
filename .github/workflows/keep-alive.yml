name: Keep Supabase Alive

on:
  schedule:
    # Berjalan setiap 5 menit (minimum interval GitHub Actions)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Bisa dijalankan manual dari GitHub

jobs:
  ping-supabase:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase Database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Install PostgreSQL client
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client > /dev/null 2>&1

          # Hapus query parameter pgbouncer yang tidak dikenali psql
          CLEAN_URL=$(echo "$DATABASE_URL" | sed 's/[?&]pgbouncer=true//g')

          # Ping the database with a simple query
          psql "$CLEAN_URL" -c "SELECT 1;" && echo "✅ Supabase is alive!" || echo "❌ Failed to reach Supabase"
